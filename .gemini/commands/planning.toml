description = "将工作拆成带验收标准和依赖顺序的小型可验证任务"
prompt = """
调用 planning-and-task-breakdown skill。

读取现有 spec（SPEC.md 或等价文件）和相关代码区域。然后：

1. 进入 plan mode：只读，不修改代码
2. 识别组件之间的 dependency graph
3. 垂直切分工作（每个任务是一条完整路径，而不是水平层）
4. 写出带 acceptance criteria 和 verification steps 的任务
5. 在阶段之间添加 checkpoints
6. 将计划提交给人工审阅

将计划保存到 tasks/plan.md，将任务列表保存到 tasks/todo.md。
"""
