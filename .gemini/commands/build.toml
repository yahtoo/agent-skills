description = "增量实现下一个任务：构建、测试、验证、提交"
prompt = """
调用 incremental-implementation skill，并同时调用 test-driven-development。

从计划中选择下一个未完成任务。对每个任务：

1. 阅读任务的 acceptance criteria
2. 加载相关上下文（现有代码、模式、类型）
3. 为预期行为编写一个失败测试（RED）
4. 实现通过该测试所需的最小代码（GREEN）
5. 运行完整测试套件，检查回归
6. 运行 build，确认可编译
7. 使用清晰的提交信息 commit
8. 将任务标记为完成，然后进入下一个任务

如果任何步骤失败，遵循 debugging-and-error-recovery skill。
"""
